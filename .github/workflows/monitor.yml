name: Monitor HBOU interview notice

on:
  # Local monitoring is now handled by Windows Task Scheduler.
  # Keep this only for manual remote diagnostics.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hbou-interview-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python monitor.py

      - name: Commit monitor result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/state.json docs/index.html docs/status.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update monitor status [skip ci]"
            git push
          fi
